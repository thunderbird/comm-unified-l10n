<html
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:xul="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
  lightweightthemes="true"
  style="min-width: 22rem; min-height: 18rem"
  scrolling="false"
>
  <head>
    <title data-l10n-id="new-folder-dialog-title"></title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src chrome:; script-src chrome: 'unsafe-inline' moz-src:; style-src chrome: 'unsafe-inline'"
    />
    <link rel="stylesheet" href="chrome://messenger/skin/messenger.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/icons.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/colors.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/folderMenus.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/input-fields.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/themeableDialog.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/contextMenu.css" />
    <link rel="localization" href="branding/brand.ftl" />
    <link rel="localization" href="messenger/new-folder-dialog.ftl" />
    <script
      defer="defer"
      src="chrome://messenger/content/globalOverlay.js"
    ></script>
    <script
      defer="defer"
      src="chrome://global/content/editMenuOverlay.js"
    ></script>
    <script
      defer="defer"
      src="chrome://messenger/content/dialogShadowDom.js"
    ></script>
    <script
      defer="defer"
      src="chrome://messenger/content/newFolderDialog.js"
    ></script>
  </head>
  <html:body
    xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  >
    <dialog
      data-l10n-id="new-folder-dialog-accept-button"
      data-l10n-attrs="buttonlabelaccept"
    >
      <label
        id="nameLabel"
        data-l10n-id="new-folder-name-label"
        control="name"
      ></label>
      <html:input
        id="name"
        type="text"
        class="input-inline"
        aria-labelledby="nameLabel"
      />

      <separator />

      <label
        data-l10n-id="new-folder-description-label"
        control="msgNewFolderPicker"
      ></label>

      <menulist
        id="msgNewFolderPicker"
        class="folderMenuItem"
        displayformat="verbose"
      >
        <menupopup
          is="folder-menupopup"
          id="MsgNewFolderPopup"
          showFileHereLabel="true"
          class="menulist-menupopup"
          mode="newFolder"
          oncommand="onFolderSelect(event)"
        />
      </menulist>

      <vbox id="newFolderTypeBox">
        <separator class="thin" />

        <label data-l10n-id="new-folder-restriction-1"></label>
        <label data-l10n-id="new-folder-restriction-2"></label>

        <separator class="thin" />

        <radiogroup id="folderGroup" orient="horizontal" class="indent">
          <radio
            oncommand="onFoldersOnly()"
            data-l10n-id="new-folder-folders-only"
          />
          <radio
            oncommand="onMessagesOnly()"
            data-l10n-id="new-folder-messages-only"
            selected="true"
          />
        </radiogroup>
      </vbox>
    </dialog>
  </html:body>
</html>
