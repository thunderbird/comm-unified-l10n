---
loader: taskgraph.loader.transform:loader

transforms:
    - gecko_taskgraph.transforms.release_deps:transforms
    - gecko_taskgraph.transforms.resolve_landoscript_keyed_by:transforms
    - gecko_taskgraph.transforms.task:transforms

task-defaults:
    run-on-repo-type: [hg]
    description: Release Promotion version tag for buildN
    run-on-projects: []
    shipping-phase: promote
    worker-type: lando
    worker:
        implementation: scriptworker-lando
        lando-repo:
            by-project:
                comm-beta: thunderbird-beta
                comm-release: thunderbird-release
                comm-esr128: thunderbird-esr128
                comm-esr140: thunderbird-esr140
                try-comm-central:
                    by-release-type:
                        beta: staging-thunderbird-beta
                        release: staging-thunderbird-release
                        esr128: staging-thunderbird-esr128
                        esr140: staging-thunderbird-esr140
                        default: ""
                default: ""
        actions:
            - tag:
                  types: ["buildN"]

                  # Used to map hg revisions to the git revisions that scriptworker-lando needs
                  hg-repo-url:
                      by-project:
                          comm-beta: https://hg.mozilla.org/releases/comm-beta
                          comm-release: https://hg.mozilla.org/releases/comm-release
                          comm-esr128: https://hg.mozilla.org/releases/comm-esr128
                          comm-esr140: https://hg.mozilla.org/releases/comm-esr140
                          try-comm-central: https://hg.mozilla.org/try-comm-central
                          default: ""

tasks:
    thunderbird:
        name: thunderbird-tag-buildN
        shipping-product: thunderbird
        treeherder:
            platform: thunderbird-release/opt
            symbol: Rel(TagBuild)
            tier: 1
            kind: build
