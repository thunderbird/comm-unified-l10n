---
loader: taskgraph.loader.transform:loader

transforms:
    - gecko_taskgraph.transforms.resolve_landoscript_keyed_by:transforms
    - gecko_taskgraph.transforms.task:transforms

task-defaults:
    run-on-repo-type: [hg]
    worker-type: lando
    worker:
        implementation: scriptworker-lando

        # Match Firefox behavior of only landing on beta when the tree is closed
        dontbuild:
            by-project:
                comm-(central|beta|release|esr140): false
                default: true
        ignore-closed-tree:
            by-project:
                comm-(central|beta|release|esr140): false
                default: true
        lando-repo:
            by-project:
                comm-central: thunderbird-main
                comm-beta: thunderbird-beta
                comm-release: thunderbird-release
                comm-esr140: thunderbird-esr140
                try-comm-central: staging-thunderbird-autoland
                default: ""
        actions:
            by-release-type:
                # Whenever the the non-default config changes, make sure to make
                #     the corresponding change in merge-automation/kind.yml
                (beta|release|esr140):
                    - l10n-bump:
                          - name: Thunderbird l10n changesets
                            path: mail/locales/l10n-changesets.json
                            l10n-repo-url: https://github.com/thunderbird/thunderbird-l10n
                            l10n-repo-target-branch: main
                            ignore-config:
                                ja:
                                    - macosx64
                                ja-JP-mac:
                                    - linux64
                                    - win32
                                    - win64
                            platform-configs: [
                                {
                                    "platforms": [
                                        "linux64",
                                        "macosx64",
                                        "win32",
                                        "win64"
                                    ],
                                    "path": "mail/locales/shipped-locales"
                                }
                            ]
                default:
                    - l10n-bump:
                          - name: Thunderbird l10n changesets
                            path: mail/locales/l10n-changesets.json
                            l10n-repo-url: https://github.com/thunderbird/thunderbird-l10n
                            l10n-repo-target-branch: main
                            ignore-config:
                                ja:
                                    - macosx64
                                ja-JP-mac:
                                    - linux64
                                    - win32
                                    - win64
                            platform-configs: [
                                {
                                    "platforms": [
                                        "linux64",
                                        "macosx64",
                                        "win32",
                                        "win64"
                                    ],
                                    "path": "mail/locales/all-locales"
                                }
                            ]

tasks:
    l10n-bumper:
        name: l10n_bumper
        description: l10n changesets bumper
        run-on-projects: []
        treeherder:
            kind: build
            platform: linux64/opt
            symbol: l10n-bump(lb)
            tier: 1
