name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: mozilla/actions/rust@2e46408d5c495e59a21e5e125e82008fad0d9408 # v1.1.7
        with:
          components: llvm-tools
          tools: cargo-llvm-cov
          token: ${{ github.token }}
      - name: Run tests and determine coverage
        run: cargo llvm-cov test --codecov --output-path codecov.json
      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: codecov.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          verbose: true
          flags: linux
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]

  rustfmt:
    uses: mozilla/actions/.github/workflows/rustfmt.yml@2e46408d5c495e59a21e5e125e82008fad0d9408 # v1.1.7

  clippy:
    uses: mozilla/actions/.github/workflows/clippy.yml@2e46408d5c495e59a21e5e125e82008fad0d9408 # v1.1.7

  deny:
    uses: mozilla/actions/.github/workflows/deny.yml@2e46408d5c495e59a21e5e125e82008fad0d9408 # v1.1.7

  machete:
    uses: mozilla/actions/.github/workflows/machete.yml@2e46408d5c495e59a21e5e125e82008fad0d9408 # v1.1.7

  semver:
    name: Check semver
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: mozilla/actions/semver@2e46408d5c495e59a21e5e125e82008fad0d9408 # v1.1.7

  mutants-pr:
    if: github.event_name == 'pull_request'
    uses: mozilla/actions/.github/workflows/mutants-pr.yml@2e46408d5c495e59a21e5e125e82008fad0d9408 # v1.1.7

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: mozilla/actions/.github/workflows/dependency-review.yml@2e46408d5c495e59a21e5e125e82008fad0d9408 # v1.1.7

  actionlint:
    uses: mozilla/actions/.github/workflows/actionlint.yml@2e46408d5c495e59a21e5e125e82008fad0d9408 # v1.1.7
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to GitHub
