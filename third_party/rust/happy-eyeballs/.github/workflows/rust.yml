name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: mozilla/actions/rust@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19
        with:
          components: llvm-tools
          tools: cargo-llvm-cov
          token: ${{ github.token }}
      - name: Run tests and determine coverage
        run: cargo llvm-cov test --codecov --output-path codecov.json
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: codecov.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          verbose: true
          flags: linux
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]

  rustfmt:
    uses: mozilla/actions/.github/workflows/rustfmt.yml@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19

  clippy:
    uses: mozilla/actions/.github/workflows/clippy.yml@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19

  deny:
    uses: mozilla/actions/.github/workflows/deny.yml@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19

  machete:
    uses: mozilla/actions/.github/workflows/machete.yml@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19

  semver:
    name: Check semver
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: mozilla/actions/semver@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19

  mutants-pr:
    if: github.event_name == 'pull_request'
    uses: mozilla/actions/.github/workflows/mutants-pr.yml@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: mozilla/actions/.github/workflows/dependency-review.yml@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19

  actionlint:
    uses: mozilla/actions/.github/workflows/actionlint.yml@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to GitHub
